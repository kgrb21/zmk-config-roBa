# ZMK Studioとマウス、トラックボールを無効化
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_MOUSE=n
CONFIG_PMW3610=n

# 【重要】リンクエラーとバッテリー通知の解消
# 報告機能だけでなく、左右通信時の代理監視も完全にオフにします
CONFIG_ZMK_BATTERY_REPORTING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n

# Bluetoothの安定化と省電力設定
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
