# ZMK Studioとマウス、トラックボールを無効化
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_MOUSE=n
CONFIG_PMW3610=n

# 【重要】バッテリー通知スパムの確実な回避策
# エラー回避のため機能はONに戻し、通知間隔を「86400秒（24時間）」に設定します
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORTING_INTERVAL=86400

# Bluetoothの安定化と省電力設定
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
