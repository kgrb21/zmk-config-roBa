manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main  # ここを main にすることで最新機能が使えます
      import: app/west.yml
    - name: zmk-pmw3610-driver
      url: https://github.com/kumamuk-git/zmk-pmw3610-driver
      revision: main
    - name: zmk-kscan-gpio-charlieplex
      url: https://github.com/petejohanson/zmk-kscan-gpio-charlieplex
      revision: main
  self:
    path: config
